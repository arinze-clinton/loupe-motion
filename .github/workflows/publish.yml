name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      # Skip publishing if this version is already on the registry.
      # Enables re-pushing old tags (e.g. for retroactive Releases)
      # without crashing the workflow on "version already published".
      - name: Check if already published
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@arinze-clinton/loupe@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION is already on the registry — skipping publish."
            echo "already=true" >> "$GITHUB_OUTPUT"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish
        if: steps.check.outputs.already != 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
