<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 160" fill="none" stroke="#F8FAFC">
  <!-- Magnifying glass lens -->
  <circle cx="64" cy="72" r="40" stroke-width="10" />
  <!-- Phase-strip motif inside the lens (timeline tick marks) -->
  <line x1="44" y1="72" x2="84" y2="72" stroke-width="3" stroke-linecap="round" opacity="0.45" />
  <line x1="64" y1="58" x2="64" y2="86" stroke-width="3" stroke-linecap="round" opacity="0.85" />
  <!-- Handle -->
  <line x1="94" y1="102" x2="124" y2="132" stroke-width="10" stroke-linecap="round" />
  <!-- Wordmark -->
  <text x="160" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
        font-size="56" font-weight="700" fill="#F8FAFC" stroke="none" letter-spacing="-1.5">Loupe</text>
</svg>
