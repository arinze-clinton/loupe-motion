<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 140" fill="none" aria-label="Loupe">
  <!-- Magnifying glass -->
  <g stroke="#0F172A" stroke-linecap="round" stroke-linejoin="round">
    <!-- Lens -->
    <circle cx="58" cy="62" r="38" stroke-width="9" fill="none" />
    <!-- Timeline strip inside the lens — three phase ticks of decreasing prominence,
         hinting at "phases on a timeline" without being literal. -->
    <line x1="34" y1="62" x2="82" y2="62" stroke-width="2" opacity="0.18" />
    <line x1="42" y1="50" x2="42" y2="74" stroke-width="3" opacity="0.55" />
    <line x1="58" y1="48" x2="58" y2="76" stroke-width="3" opacity="0.85" />
    <line x1="74" y1="50" x2="74" y2="74" stroke-width="3" opacity="0.55" />
    <!-- Playhead dot -->
    <circle cx="58" cy="62" r="3" stroke="none" fill="#0F172A" />
    <!-- Handle -->
    <line x1="86" y1="90" x2="116" y2="120" stroke-width="9" />
  </g>
  <!-- Wordmark -->
  <text x="148" y="80"
        font-family="-apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif"
        font-size="58"
        font-weight="700"
        fill="#0F172A"
        letter-spacing="-2">Loupe</text>
</svg>
